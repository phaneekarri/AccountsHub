# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "master", "dev" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    
    - name: Restore dependencies
      run: dotnet restore
      working-directory: src/Infra
    - name: Restore dependencies
      run: dotnet restore
      working-directory: src/InfraEntities
    - name: Restore dependencies
      run: dotnet restore
      working-directory: src/CustomerEntities        
    - name: Restore dependencies
      run: dotnet restore
      working-directory: src/CustomerApi
    - name: Restore dependencies
      run: dotnet restore
      working-directory: src/UserAuthEntities
    - name: Restore dependencies
      run: dotnet restore
      working-directory: src/UserAuthApi

    - name: Build
      run: dotnet build --no-restore
      working-directory: src/Infra
    - name: Build
      run: dotnet build --no-restore
      working-directory: src/InfraEntities
    - name: Build
      run: dotnet build --no-restore
      working-directory: src/CustomerEntities
    - name: Build
      run: dotnet build --no-restore
      working-directory: src/CustomerApi
    - name: Build
      run: dotnet build --no-restore
      working-directory: src/UserAuthEntities
    - name: Build
      run: dotnet build --no-restore
      working-directory: src/UserAuthApi
    - name: Test CustomerEntitiesTest
      run: dotnet test --no-build --verbosity normal
      working-directory: test/CustomerEntitiesTest
    - name: Test CustomerApiTest
      run: dotnet test --no-build --verbosity normal
      working-directory: test/CustomerApiTest
    - name: Test UserAuthApiTest
      run: dotnet test --no-build --verbosity normal
      working-directory: test/UserAuthApiTest
    - name: Test Infra.Tests
      run: dotnet test --no-build --verbosity normal
      working-directory: test/Infra.Tests
